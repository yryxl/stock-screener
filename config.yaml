# ============================================
# 芒格价值投资选股系统 - 配置文件
# ============================================

# 微信测试号配置（消息推送）
wechat:
  appid: "YOUR_APPID"
  appsecret: "YOUR_APPSECRET"
  openid: "YOUR_OPENID"
  template_id: "YOUR_TEMPLATE_ID"

# GitHub 配置（Streamlit界面读写持仓数据用）
github:
  token: "YOUR_GITHUB_TOKEN"
  repo: "YOUR_GITHUB_USERNAME/stock-screener"
  holdings_file: "holdings.json"

# ============================================
# 筛选条件（芒格五大硬指标）
# ============================================
screener:
  roe_years: 10
  roe_min: 20
  debt_ratio_max: 50
  current_ratio_min: 1.5
  fcf_positive_years: 5
  opm_years: 10
  opm_allow_decline: false
  dividend_yield_min: 6

# ============================================
# 卖出条件
# ============================================
sell_rules:
  roe_warning: 15
  opm_decline_years: 2
  dividend_yield_low: 3
  debt_ratio_danger: 60
