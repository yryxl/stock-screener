name: 每日选股分析

on:
  schedule:
    # 每个工作日北京时间下午5点运行（UTC 9:00）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置企业微信
        run: |
          sed -i "s/YOUR_CORPID/${{ secrets.WECOM_CORPID }}/" config.yaml
          sed -i "s/YOUR_SECRET/${{ secrets.WECOM_SECRET }}/" config.yaml

      - name: 运行选股分析
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"
