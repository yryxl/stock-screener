name: 每日选股分析

on:
  schedule:
    # 北京时间（UTC+8）触发计划：
    # 凌晨 02:30 → full（全市场扫描，夜间低压时跑）
    # 上午 08:55 → send_ai（盘前发昨日分析结果）
    # 上午 09:05 → send_ai 备份（GitHub cron 常跳过 9:00，加个 9:05）
    # 中午 12:30 → holdings（盘中持仓检查）
    # 下午 15:10 → holdings 备份（收盘后检查）
    # 下午 18:00 → watchlist（晚间关注表分析）
    # 晚上 22:00 → watchlist 备份
    - cron: '30 18 * * *'    # 02:30 北京
    - cron: '55 0 * * *'     # 08:55 北京
    - cron: '5 1 * * *'      # 09:05 北京（9点备份，防GitHub跳过）
    - cron: '30 4 * * *'     # 12:30 北京
    - cron: '10 7 * * *'     # 15:10 北京
    - cron: '0 10 * * *'     # 18:00 北京
    - cron: '0 14 * * *'     # 22:00 北京

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        default: 'all'
        type: choice
        options:
          - all
          - holdings
          - watchlist
          - full
          - send_ai
          - holiday
          - reanalyze


jobs:
  screen:
    runs-on: ubuntu-latest
    # 防止某次运行卡住 6 小时（Actions 默认 timeout 太长）
    # all 模式通常 30-60 分钟够用，其他模式几分钟
    timeout-minutes: 60
    # 同一 workflow 并发控制：新运行会取消老的正在运行的
    # 防止 cron 连续触发多个 job 互相冲突
    concurrency:
      group: daily-screen
      cancel-in-progress: false

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置微信推送
        run: |
          sed -i "s/YOUR_APPID/${{ secrets.WX_APPID }}/" config.yaml
          sed -i "s/YOUR_APPSECRET/${{ secrets.WX_APPSECRET }}/" config.yaml
          sed -i "s/YOUR_OPENID/${{ secrets.WX_OPENID }}/" config.yaml
          sed -i "s/YOUR_TEMPLATE_ID/${{ secrets.WX_TEMPLATE_ID }}/" config.yaml

      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            if [ "$HOUR" -le 4 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 9 ]; then
              echo "mode=send_ai" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 13 ]; then
              echo "mode=holdings" >> $GITHUB_OUTPUT
            else
              echo "mode=watchlist" >> $GITHUB_OUTPUT
            fi
          fi


      - name: 运行选股分析
        # 单步超时 45 分钟，防止 akshare 接口卡死导致整个 job 挂 6 小时
        # all 模式历史最长约 50 分钟，加 45 分钟保留余量
        timeout-minutes: 45
        run: python main.py --mode ${{ steps.mode.outputs.mode }} --force
        env:
          PYTHONUNBUFFERED: "1"

      - name: 提交每日结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 把分析结果暂存到 /tmp（避免被 git reset 清掉）
          cp daily_results.json /tmp/daily_results.json 2>/dev/null || true
          cp market_scan_cache.json /tmp/market_scan_cache.json 2>/dev/null || true
          cp watchlist.json /tmp/watchlist.json 2>/dev/null || true
          mkdir -p /tmp/_snapshots && cp -r snapshots/* /tmp/_snapshots/ 2>/dev/null || true
          mkdir -p /tmp/_games && cp -r backtest_games/* /tmp/_games/ 2>/dev/null || true
          # 强制同步到远程最新状态（包含所有代码提交，不会冲突）
          git fetch origin main
          git reset --hard origin/main
          # 把分析结果覆盖回工作目录
          cp /tmp/daily_results.json . 2>/dev/null || true
          cp /tmp/market_scan_cache.json . 2>/dev/null || true
          cp /tmp/watchlist.json . 2>/dev/null || true
          mkdir -p snapshots && cp -r /tmp/_snapshots/* snapshots/ 2>/dev/null || true
          mkdir -p backtest_games && cp -r /tmp/_games/* backtest_games/ 2>/dev/null || true
          # 提交并推送（基于最新代码，绝不会冲突）
          git add daily_results.json market_scan_cache.json watchlist.json snapshots/ backtest_games/ stock_notes.json user_cash.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "更新数据 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push

