name: 每日选股分析

on:
  schedule:
    # 北京时间（UTC+8）触发计划：
    # 凌晨 02:30 → full（全市场扫描，夜间低压时跑）
    # 上午 08:55 → send_ai（盘前发昨日分析结果）
    # 上午 09:05 → send_ai 备份（GitHub cron 常跳过 9:00，加个 9:05）
    # 中午 12:30 → holdings（盘中持仓检查）
    # 下午 15:10 → holdings 备份（收盘后检查）
    # 下午 18:00 → watchlist（晚间关注表分析）
    # 晚上 22:00 → watchlist 备份
    # BUG-029 删：'30 18 * * *' 02:30 北京 mode=full（旧全市场扫描）
    # 已被分段扫描（17/19/21/23/01/03 七段每段 ~916 只）替代
    # 保留这个 cron 会在 02:30 启动 5500+ 只全市场扫描，必然 75min 超时
    - cron: '55 0 * * *'     # 08:55 北京 - send_ai
    - cron: '5 1 * * *'      # 09:05 北京（9点备份，防GitHub跳过）
    - cron: '30 4 * * *'     # 12:30 北京 - holdings
    - cron: '10 7 * * *'     # 15:10 北京 - holdings 备份
    - cron: '0 10 * * *'     # 18:00 北京 - watchlist
    - cron: '0 14 * * *'     # 22:00 北京 - watchlist 备份
    # TODO-022 方案 D：分段全市场扫描 6 段（17/19/21/23/01/03 北京时间）
    # 每段约 916 只（5500/6），每段 2 小时间隔
    # 相比原 7 段，整体提前 2 小时完成，留更多补漏时间
    - cron: '0 9 * * *'      # 17:00 北京 - mode=full_p1（段 1，尾号 % 6 == 0）
    - cron: '0 11 * * *'     # 19:00 北京 - mode=full_p2（段 2，尾号 % 6 == 1）
    - cron: '0 13 * * *'     # 21:00 北京 - mode=full_p3（段 3，尾号 % 6 == 2）
    - cron: '0 15 * * *'     # 23:00 北京 - mode=full_p4（段 4，尾号 % 6 == 3）
    - cron: '0 17 * * *'     # 01:00 北京 - mode=full_p5（段 5，尾号 % 6 == 4）
    - cron: '0 19 * * *'     # 03:00 北京 - mode=full_p6（段 6，尾号 % 6 == 5）
    # TODO-022 方案 D 补漏：凌晨 4 轮 + 白天 3 轮 = 7 个擦底
    - cron: '0 20 * * *'     # 04:00 北京 - mode=patch_round（凌晨补漏 1）
    - cron: '0 21 * * *'     # 05:00 北京 - mode=patch_round（凌晨补漏 2）
    - cron: '0 22 * * *'     # 06:00 北京 - mode=patch_round（凌晨补漏 3）
    - cron: '0 23 * * *'     # 07:00 北京 - mode=patch_round（凌晨补漏 4）
    - cron: '15 0 * * *'     # 08:15 北京 - mode=merge_full（合并段 + 补漏）
    - cron: '0 3 * * *'      # 11:00 北京 - mode=patch_round（白天补漏 5）
    - cron: '0 6 * * *'      # 14:00 北京 - mode=patch_round（白天补漏 6）
    - cron: '0 8 * * *'      # 16:00 北京 - mode=patch_round（白天补漏 7）

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        default: 'holdings'
        type: choice
        options:
          - all
          - holdings
          - watchlist
          - full
          - send_ai
          - holiday
          - reanalyze
          # TODO-022 第 2 批：分段扫描手动触发选项
          - full_p1
          - full_p2
          - full_p3
          - full_p4
          - full_p5
          - full_p6
          # TODO-022 方案 D 补漏/合并
          - patch_round
          - merge_full


jobs:
  screen:
    runs-on: ubuntu-latest
    # 防止某次运行卡住 6 小时（Actions 默认 timeout 太长）
    # all 模式实测最长 50-60 分钟，提到 90 分钟留余量（2026-04-19 修 BUG-018）
    timeout-minutes: 90
    # 同一 workflow 并发控制：新运行会取消老的正在运行的
    # 防止 cron 连续触发多个 job 互相冲突
    concurrency:
      group: daily-screen
      cancel-in-progress: false

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置微信推送
        run: |
          sed -i "s/YOUR_APPID/${{ secrets.WX_APPID }}/" config.yaml
          sed -i "s/YOUR_APPSECRET/${{ secrets.WX_APPSECRET }}/" config.yaml
          sed -i "s/YOUR_OPENID/${{ secrets.WX_OPENID }}/" config.yaml
          sed -i "s/YOUR_TEMPLATE_ID/${{ secrets.WX_TEMPLATE_ID }}/" config.yaml

      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            MINUTE=$(TZ='Asia/Shanghai' date +%M)
            # TODO-022 方案 D：分段扫描 6 段（17/19/21/23/01/03 北京）
            if [ "$HOUR" = "17" ]; then
              echo "mode=full_p1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "19" ]; then
              echo "mode=full_p2" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "21" ]; then
              echo "mode=full_p3" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "23" ]; then
              echo "mode=full_p4" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "01" ]; then
              echo "mode=full_p5" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then
              echo "mode=full_p6" >> $GITHUB_OUTPUT
            # TODO-022 方案 D：补漏 凌晨 4 + 白天 3 + merge
            elif [ "$HOUR" = "04" ] || [ "$HOUR" = "05" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ]; then
              echo "mode=patch_round" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "08" ] && [ "$MINUTE" -ge "15" ] && [ "$MINUTE" -lt "30" ]; then
              echo "mode=merge_full" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "11" ] || [ "$HOUR" = "14" ] || [ "$HOUR" = "16" ]; then
              echo "mode=patch_round" >> $GITHUB_OUTPUT
            # BUG-029 修：删除 mode=full 兜底（cron 延迟会让段时段被这里捕获导致 75min 超时）
            # 原有时段保持，但 0/2 这种"非整时段"时统一走 patch_round（安全兜底）
            elif [ "$HOUR" = "00" ] || [ "$HOUR" = "02" ]; then
              echo "mode=patch_round" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 9 ]; then
              echo "mode=send_ai" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 13 ]; then
              echo "mode=holdings" >> $GITHUB_OUTPUT
            else
              echo "mode=watchlist" >> $GITHUB_OUTPUT
            fi
          fi


      - name: 运行选股分析
        # 单步超时 75 分钟（all 模式实测 50-60 分钟，加 15 分钟余量）
        # 2026-04-19 BUG-018 修：原 45min 在 watchlist+akshare 慢时常超时
        # 即使超时，main.py 的 save_json 现在会用"缩水检查"保护 daily_results 不被覆盖
        timeout-minutes: 75
        run: python main.py --mode ${{ steps.mode.outputs.mode }} --force
        env:
          PYTHONUNBUFFERED: "1"

      - name: 提交每日结果
        # BUG-032：always() 让前一步 timeout 时也提交已有的部分文件
        # 之前：选股 timeout → commit 步骤跳过 → 已扫部分全丢
        # 现在：哪怕 timeout，也能保存已扫到的部分
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 把分析结果暂存到 /tmp（避免被 git reset 清掉）
          cp daily_results.json /tmp/daily_results.json 2>/dev/null || true
          cp market_scan_cache.json /tmp/market_scan_cache.json 2>/dev/null || true
          cp watchlist.json /tmp/watchlist.json 2>/dev/null || true
          mkdir -p /tmp/_snapshots && cp -r snapshots/* /tmp/_snapshots/ 2>/dev/null || true
          mkdir -p /tmp/_games && cp -r backtest_games/* /tmp/_games/ 2>/dev/null || true
          # BUG-030 修：备份 TODO-022 分段扫描相关文件（之前漏了导致 6 段白跑）
          mkdir -p /tmp/_scan_files && cp market_scan_full_p*.json /tmp/_scan_files/ 2>/dev/null || true
          cp market_scan_patch_*.json /tmp/_scan_files/ 2>/dev/null || true
          cp scan_freshness.json /tmp/scan_freshness.json 2>/dev/null || true
          cp scan_pending_retry.json /tmp/scan_pending_retry.json 2>/dev/null || true
          cp scan_anomaly_log.json /tmp/scan_anomaly_log.json 2>/dev/null || true
          cp transaction_log.json /tmp/transaction_log.json 2>/dev/null || true
          # 强制同步到远程最新状态（包含所有代码提交，不会冲突）
          git fetch origin main
          git reset --hard origin/main
          # 把分析结果覆盖回工作目录
          cp /tmp/daily_results.json . 2>/dev/null || true
          cp /tmp/market_scan_cache.json . 2>/dev/null || true
          cp /tmp/watchlist.json . 2>/dev/null || true
          mkdir -p snapshots && cp -r /tmp/_snapshots/* snapshots/ 2>/dev/null || true
          mkdir -p backtest_games && cp -r /tmp/_games/* backtest_games/ 2>/dev/null || true
          # BUG-030 修：恢复 TODO-022 分段扫描文件
          cp /tmp/_scan_files/market_scan_full_p*.json . 2>/dev/null || true
          cp /tmp/_scan_files/market_scan_patch_*.json . 2>/dev/null || true
          cp /tmp/scan_freshness.json . 2>/dev/null || true
          cp /tmp/scan_pending_retry.json . 2>/dev/null || true
          cp /tmp/scan_anomaly_log.json . 2>/dev/null || true
          cp /tmp/transaction_log.json . 2>/dev/null || true
          # 提交并推送（基于最新代码，绝不会冲突）
          # BUG-030 修：加入 TODO-022 + H5 + scan validator 等新增文件
          git add daily_results.json market_scan_cache.json watchlist.json \
                  snapshots/ backtest_games/ stock_notes.json user_cash.json \
                  market_scan_full_p1.json market_scan_full_p2.json \
                  market_scan_full_p3.json market_scan_full_p4.json \
                  market_scan_full_p5.json market_scan_full_p6.json \
                  market_scan_patch_*.json \
                  scan_freshness.json scan_pending_retry.json scan_anomaly_log.json \
                  transaction_log.json \
                  2>/dev/null || true
          git diff --cached --quiet || git commit -m "更新数据 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push

