name: 每日选股分析

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置微信推送
        run: |
          sed -i "s/YOUR_APPID/${{ secrets.WX_APPID }}/" config.yaml
          sed -i "s/YOUR_APPSECRET/${{ secrets.WX_APPSECRET }}/" config.yaml
          sed -i "s/YOUR_OPENID/${{ secrets.WX_OPENID }}/" config.yaml
          sed -i "s/YOUR_TEMPLATE_ID/${{ secrets.WX_TEMPLATE_ID }}/" config.yaml

      - name: 运行选股分析
        run: python main.py --force
        env:
          PYTHONUNBUFFERED: "1"

        
      - name: 提交每日结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_results.json
          git diff --cached --quiet || git commit -m "更新每日筛选结果 $(date +%Y-%m-%d)"
          git push

