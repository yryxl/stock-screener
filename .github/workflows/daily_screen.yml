name: 每日选股分析

on:
  schedule:
    - cron: '30 18 * * *'
    - cron: '0 1 * * *'
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        default: 'all'
        type: choice
        options:
          - all
          - holdings
          - watchlist
          - full
          - send_ai
          - holiday
          - reanalyze


jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置微信推送
        run: |
          sed -i "s/YOUR_APPID/${{ secrets.WX_APPID }}/" config.yaml
          sed -i "s/YOUR_APPSECRET/${{ secrets.WX_APPSECRET }}/" config.yaml
          sed -i "s/YOUR_OPENID/${{ secrets.WX_OPENID }}/" config.yaml
          sed -i "s/YOUR_TEMPLATE_ID/${{ secrets.WX_TEMPLATE_ID }}/" config.yaml

      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ='Asia/Shanghai' date +%H)
            if [ "$HOUR" -le 4 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 9 ]; then
              echo "mode=send_ai" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 13 ]; then
              echo "mode=holdings" >> $GITHUB_OUTPUT
            else
              echo "mode=watchlist" >> $GITHUB_OUTPUT
            fi
          fi


      - name: 运行选股分析
        run: python main.py --mode ${{ steps.mode.outputs.mode }} --force
        env:
          PYTHONUNBUFFERED: "1"

      - name: 防止 Streamlit 休眠
        run: curl -s https://yryxlstock.streamlit.app/ > /dev/null || true

      - name: 提交每日结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 把分析结果暂存到 /tmp（避免被 git reset 清掉）
          cp daily_results.json /tmp/daily_results.json 2>/dev/null || true
          cp market_scan_cache.json /tmp/market_scan_cache.json 2>/dev/null || true
          cp watchlist.json /tmp/watchlist.json 2>/dev/null || true
          mkdir -p /tmp/_snapshots && cp -r snapshots/* /tmp/_snapshots/ 2>/dev/null || true
          mkdir -p /tmp/_games && cp -r backtest_games/* /tmp/_games/ 2>/dev/null || true
          # 强制同步到远程最新状态（包含所有代码提交，不会冲突）
          git fetch origin main
          git reset --hard origin/main
          # 把分析结果覆盖回工作目录
          cp /tmp/daily_results.json . 2>/dev/null || true
          cp /tmp/market_scan_cache.json . 2>/dev/null || true
          cp /tmp/watchlist.json . 2>/dev/null || true
          mkdir -p snapshots && cp -r /tmp/_snapshots/* snapshots/ 2>/dev/null || true
          mkdir -p backtest_games && cp -r /tmp/_games/* backtest_games/ 2>/dev/null || true
          # 提交并推送（基于最新代码，绝不会冲突）
          git add daily_results.json market_scan_cache.json watchlist.json snapshots/ backtest_games/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "更新数据 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push

